- name: create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: '0755'

- name: copy Dockerfile
  copy:
    src: "{{ playbook_dir }}/../Dockerfile"
    dest: "{{ app_dir }}/Dockerfile"

- name: copy app source
  copy:
    src: "{{ playbook_dir }}/../app/"
    dest: "{{ app_dir }}/app/"
    mode: preserve

- name: copy pyproject.toml
  copy:
    src: "{{ playbook_dir }}/../pyproject.toml"
    dest: "{{ app_dir }}/pyproject.toml"

- name: copy poetry.lock
  copy:
    src: "{{ playbook_dir }}/../poetry.lock"
    dest: "{{ app_dir }}/poetry.lock"

- name: copy README.md
  copy:
    src: "{{ playbook_dir }}/../README.md"
    dest: "{{ app_dir }}/README.md"

- name: render docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"

- name: render environment file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"

- name: start app
  command: docker compose up -d --build
  args:
    chdir: "{{ app_dir }}"

- name: wait for app startup
  uri:
    url: "http://localhost:{{ app_port }}/health"
    status_code: 200
  register: health
  retries: 5
  delay: 3
  until: health.status == 200